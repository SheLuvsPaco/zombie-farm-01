{{ define "main" }}
<div class="search-page-container">

    <div class="search-page-header">
        <div class="search-page-title-row">
            <svg class="search-page-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <h1>Search</h1>
        </div>
        <div class="search-page-bar-wrapper">
            <div class="search-page-input-wrapper">
                <input type="search" id="search-page-input" class="search-page-input"
                    placeholder="Search integrations, comparisons, troubleshooting..." autocomplete="off" autofocus />
            </div>
            <button id="search-page-btn" class="search-page-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>
        </div>
        <p id="search-result-count" class="search-result-count"></p>
    </div>

    <div id="search-page-results" class="search-page-results">
        <!-- Results injected here by JS -->
    </div>

    <div id="search-page-empty" class="search-page-empty" style="display:none;">
        <div class="search-empty-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                <line x1="8" y1="11" x2="14" y2="11"></line>
            </svg>
        </div>
        <p class="search-empty-title">No results found for "<span id="search-empty-query"></span>"</p>
        <p class="search-empty-hint">Try different keywords or <a href="/">browse all articles</a></p>
    </div>

    <div id="search-page-loading" class="search-page-loading" style="display:none;">
        <div class="search-loading-spinner"></div>
        <p>Searching...</p>
    </div>

</div>

<script src="/js/search-engine.js" defer></script>
{{ end }}
