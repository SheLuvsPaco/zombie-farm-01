<div class="search-bar-wrapper" id="global-search-wrapper">
    <div class="search-bar-inner">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="search" id="global-search-input" class="global-search-input" placeholder="Search..."
            autocomplete="off" aria-label="Search articles" aria-expanded="false"
            aria-controls="search-preview-dropdown" />
        <kbd class="search-kbd">⌘K</kbd>
    </div>

    <!-- Live Preview Dropdown -->
    <div id="search-preview-dropdown" class="search-preview-dropdown" role="listbox" aria-label="Search suggestions"
        style="display:none;">
        <div class="search-preview-header">
            <span class="search-preview-label">Results</span>
        </div>
        <ul id="search-preview-list" class="search-preview-list"></ul>
        <div id="search-preview-footer" class="search-preview-footer" style="display:none;">
            <span id="search-preview-more"></span>
            <span class="search-preview-hint">
                <kbd class="search-hint-kbd">Enter</kbd> to view all
            </span>
        </div>
    </div>
</div>
